<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap');
        
        body { 
            font-family: 'Comic Neue', cursive;
            cursor: url('paw.png') 16 16, auto;
            overflow: hidden;
        }
        
        .menu-img {
            width: 105px;
            height: auto;
            image-rendering: crisp-edges;
        }
        
        .big-cat {
            max-height: 75%;
            max-width: 75%;
            object-fit: contain;
        }

        /* Эффект следа лапки при клике */
        .paw-print {
            position: absolute;
            width: 50px;
            height: 50px;
            background: url('paw332.png') no-repeat center/contain;
            pointer-events: none;
            opacity: 0.9;
            z-index: 9999;
            animation: pawFade 1.2s forwards;
            transform: translate(-50%, -50%);
        }

        @keyframes pawFade {
            0% { opacity: 0.9; transform: translate(-50%, -50%) scale(0.6); }
            20% { transform: translate(-50%, -50%) scale(1.1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.3); }
        }
    </style>
</head>
<body class="bg-white min-h-screen">
    <div class="flex h-screen">
        
        <!-- Левая панель -->
        <div class="w-96 bg-white flex flex-col p-8">
            <div class="mt-20 space-y-12">
                <a href="#" class="flex items-center gap-6 group">
                    <img src="docs.png" alt="Docs" class="menu-img">
                </a>
                
                <a href="#" class="flex items-center gap-6 group">
                    <img src="roadmap.png" alt="Roadmap" class="menu-img">
                </a>
                
                <a href="#" class="flex items-center gap-6 group">
                    <img src="treasury.png" alt="Treasury" class="menu-img">
                </a>
            </div>
        </div>
        
        <!-- Правая часть с котом -->
        <div class="flex-1 flex items-end justify-center relative pb-16 pl-8">
            <img src="cat.png" alt="Cat" class="big-cat">
        </div>
    </div>

    <script>
        document.addEventListener('click', function(e) {
            const paw = document.createElement('div');
            paw.className = 'paw-print';
            paw.style.left = e.clientX + 'px';
            paw.style.top = e.clientY + 'px';
            document.body.appendChild(paw);

            // Удаляем элемент после анимации
            setTimeout(() => {
                paw.remove();
            }, 1500);
        });
    </script>
</body>
</html>
