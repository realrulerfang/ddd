<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap');
      
        body {
            font-family: 'Comic Neue', cursive;
            cursor: url('paw.png') 16 16, auto;
        }
      
        .menu-item {
            display: flex;
            align-items: center;
            gap: 24px;
            position: relative;
        }
        /* Docs — меньше */
        .docs-img {
            width: 135px;
            height: auto;
            image-rendering: crisp-edges;
            animation: subtleShake 0.8s infinite ease-in-out;
        }
       
        /* Roadmap и Treasury — большие */
        .menu-img {
            width: 210px;
            height: auto;
            image-rendering: crisp-edges;
            animation: subtleShake 0.8s infinite ease-in-out;
        }
      
        @keyframes subtleShake {
            0%, 100% { transform: translate(0, 0) rotate(-0.6deg); }
            25% { transform: translate(1.5px, 0.8px) rotate(0.7deg); }
            50% { transform: translate(-0.8px, -1.2px) rotate(-0.5deg); }
            75% { transform: translate(-1.4px, 0.6px) rotate(0.6deg); }
        }
      
        .menu-item:hover .docs-img,
        .menu-item:hover .menu-img {
            animation: none;
            transform: scale(1.08);
        }

        /* Иконка дороги — очень маленькая и ближе к надписи */
        .roadmap-icon {
            position: absolute;
            left: 100%;
            top: 50%;
            width: 32px;
            height: auto;
            opacity: 0;
            transform: translateY(-50%) translateX(-70px);   
            transition: all 0.35s ease;
            z-index: 10;
        }
        .menu-item:hover .roadmap-icon {
            opacity: 1;
            transform: translateY(-50%) translateX(-70px);
        }

        /* Анимация кота */
        .big-cat {
            max-height: 75%;
            max-width: 75%;
            object-fit: contain;
            animation: catLick 4s infinite ease-in-out;
            transform-origin: bottom center;
        }
        @keyframes catLick {
            0%, 100% { transform: rotate(-3deg) translateY(0); }
            20% { transform: rotate(2deg) translateY(-8px); }
            45% { transform: rotate(-4deg) translateY(4px); }
            70% { transform: rotate(3deg) translateY(-6px); }
        }
    </style>
</head>
<body class="bg-white min-h-screen overflow-hidden">
    <div class="flex h-screen">
      
        <div class="w-96 bg-white flex flex-col p-8">
            <div class="mt-20 space-y-8">
               
                <a href="#" class="menu-item">
                    <img src="docs.png" alt="Docs" class="docs-img">
                </a>
              
                <a href="#" class="menu-item">
                    <img src="roadmap.png" alt="Roadmap" class="menu-img">
                    <img src="doroga.png" alt="Road" class="roadmap-icon">
                </a>
              
                <a href="#" class="menu-item">
                    <img src="treasury.png" alt="Treasury" class="menu-img">
                </a>
            </div>
        </div>
      
        <div class="flex-1 flex items-end justify-center relative pb-12 pl-8">
            <img src="cat.png" alt="Cat" class="big-cat">
        </div>
    </div>
</body>
</html>
