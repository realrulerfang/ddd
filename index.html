<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap');
        
        body { 
            font-family: 'Comic Neue', cursive;
            cursor: url('paw.png') 16 16, auto;
        }
        
        .menu-item {
            position: relative;
            display: flex;
            align-items: center;
            gap: 24px;
            width: fit-content;
        }
        
        .menu-img {
            width: 135px;
            height: auto;
            image-rendering: crisp-edges;
            transition: transform 0.3s ease;
        }
        
        .menu-item:hover .menu-img {
            transform: scale(1.08);
        }

        /* Клубок для каждого пункта */
        .yarn {
            position: absolute;
            left: 100%;                    /* Справа от картинки */
            top: 50%;
            width: 38px;
            height: 38px;
            background: radial-gradient(circle, #f97316 30%, #ea580c 70%, #c2410c);
            border-radius: 50%;
            border: 4px solid #111;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            opacity: 0;
            transform: translateY(-50%) scale(0.6);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        /* Раскатывание при наведении */
        .menu-item:hover .yarn {
            opacity: 1;
            transform: translateY(-50%) translateX(30px) scale(1.35) rotate(720deg);
            width: 65px;
            height: 65px;
        }

        /* Лёгкая анимация кота */
        .big-cat {
            max-height: 72%;
            max-width: 72%;
            object-fit: contain;
            animation: catSway 4s infinite ease-in-out;
        }

        @keyframes catSway {
            0%, 100% { transform: rotate(-4deg); }
            50% { transform: rotate(4deg); }
        }
    </style>
</head>
<body class="bg-white min-h-screen overflow-hidden">
    <div class="flex h-screen">
        
        <!-- Левая панель -->
        <div class="w-96 bg-white flex flex-col p-8">
            <div class="mt-20 space-y-8">
                
                <!-- Docs -->
                <a href="#" class="menu-item">
                    <img src="docs.png" alt="Docs" class="menu-img">
                    <div class="yarn"></div>
                </a>
                
                <!-- Roadmap -->
                <a href="#" class="menu-item">
                    <img src="roadmap.png" alt="Roadmap" class="menu-img">
                    <div class="yarn"></div>
                </a>
                
                <!-- Treasury -->
                <a href="#" class="menu-item">
                    <img src="treasury.png" alt="Treasury" class="menu-img">
                    <div class="yarn"></div>
                </a>
            </div>
        </div>
        
        <!-- Кот -->
        <div class="flex-1 flex items-end justify-center relative pb-12 pl-8">
            <img src="cat.png" alt="Cat" class="big-cat">
        </div>
    </div>
</body>
</html>
