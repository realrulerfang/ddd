<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap');
        
        body { 
            font-family: 'Comic Neue', cursive;
            cursor: url('paw.png') 16 16, auto;
            overflow: hidden;
        }
        
        .menu-item {
            display: flex;
            align-items: center;
            gap: 24px;
        }
        
        .menu-img {
            width: 105px;
            height: auto;
            image-rendering: crisp-edges;
            animation: subtleShake 2.8s infinite ease-in-out;
        }
        
        @keyframes subtleShake {
            0%, 100% { transform: translate(0, 0) rotate(-0.8deg); }
            25%      { transform: translate(1.5px, 0.5px) rotate(0.8deg); }
            50%      { transform: translate(0, -1px) rotate(-0.4deg); }
            75%      { transform: translate(-1.5px, 0.5px) rotate(0.6deg); }
        }
        
        .menu-item:hover .menu-img {
            animation: none;
            transform: scale(1.09);
        }
        
        .big-cat {
            max-height: 75%;
            max-width: 75%;
            object-fit: contain;
        }
    </style>
</head>
<body class="bg-white min-h-screen">
    <div class="flex h-screen">
        
        <!-- Левая панель -->
        <div class="w-96 bg-white flex flex-col p-8">
            <div class="mt-20 space-y-12">
                <a href="#" class="menu-item group">
                    <img src="docs.png" alt="Docs" class="menu-img">
                </a>
                
                <a href="#" class="menu-item group">
                    <img src="roadmap.png" alt="Roadmap" class="menu-img">
                </a>
                
                <a href="#" class="menu-item group">
                    <img src="treasury.png" alt="Treasury" class="menu-img">
                </a>
            </div>
        </div>
        
        <!-- Кот -->
        <div class="flex-1 flex items-end justify-center relative pb-16 pl-8">
            <img src="cat.png" alt="Cat" class="big-cat">
        </div>
    </div>
</body>
</html>
