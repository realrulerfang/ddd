<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap');
        
        body { 
            font-family: 'Comic Neue', cursive;
            cursor: url('paw.png') 16 16, auto;
        }
        
        .menu-img {
            width: 135px;
            height: auto;
            image-rendering: crisp-edges;
            animation: subtleShake 0.8s infinite ease-in-out;
        }
        
        .menu-item:hover .menu-img {
            animation: none;
            transform: scale(1.08);
        }

        /* === АНИМАЦИЯ КОТА ИГРАЕТ С КЛУБКОМ === */
        .cat-container {
            position: relative;
            display: inline-block;
        }

        .big-cat {
            max-height: 72%;
            max-width: 72%;
            object-fit: contain;
            animation: catPlay 3.5s infinite ease-in-out;
            transform-origin: bottom center;
        }

        .yarn {
            position: absolute;
            bottom: 28%;
            left: 42%;
            width: 45px;
            height: 45px;
            background: radial-gradient(circle, #f97316 20%, #ea580c 60%, #c2410c);
            border-radius: 50%;
            border: 4px solid #111;
            animation: yarnRoll 3.5s infinite ease-in-out;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        @keyframes catPlay {
            0%, 100% { transform: rotate(-6deg) translateY(0); }
            25%      { transform: rotate(8deg) translateY(-15px); }
            50%      { transform: rotate(-4deg) translateY(8px); }
            75%      { transform: rotate(7deg) translateY(-12px); }
        }

        @keyframes yarnRoll {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25%      { transform: translate(35px, -8px) rotate(180deg); }
            50%      { transform: translate(8px, 15px) rotate(360deg); }
            75%      { transform: translate(-25px, -10px) rotate(540deg); }
        }
    </style>
</head>
<body class="bg-white min-h-screen overflow-hidden">
    <div class="flex h-screen">
        
        <!-- Левая панель -->
        <div class="w-96 bg-white flex flex-col p-8">
            <div class="mt-20 space-y-8">
                <a href="#" class="menu-item">
                    <img src="docs.png" alt="Docs" class="menu-img">
                </a>
                <a href="#" class="menu-item">
                    <img src="roadmap.png" alt="Roadmap" class="menu-img">
                </a>
                <a href="#" class="menu-item">
                    <img src="treasury.png" alt="Treasury" class="menu-img">
                </a>
            </div>
        </div>
        
        <!-- Кот с клубком -->
        <div class="flex-1 flex items-end justify-center relative pb-12 pl-8">
            <div class="cat-container">
                <img src="cat.png" alt="Cat" class="big-cat">
                <div class="yarn"></div>
            </div>
        </div>
    </div>
</body>
</html>
