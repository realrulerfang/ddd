<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brian’s Emotional Support Cat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap');
   
        body {
            font-family: 'Comic Neue', cursive;
            cursor: url('paw.png') 16 16, auto;
        }
   
        .menu-item {
            display: flex;
            align-items: center;
            gap: 24px;
            position: relative;
        }
        .docs-img { width: 135px; height: auto; image-rendering: crisp-edges; animation: subtleShake 0.8s infinite ease-in-out; }
        .menu-img { width: 210px; height: auto; image-rendering: crisp-edges; animation: subtleShake 0.8s infinite ease-in-out; }
        .token-img { width: 175px; height: auto; image-rendering: crisp-edges; animation: subtleShake 0.8s infinite ease-in-out; transform: translateX(-15px) translateY(-13px); }
   
        @keyframes subtleShake {
            0%, 100% { transform: translate(0, 0) rotate(-0.6deg); }
            25% { transform: translate(1.5px, 0.8px) rotate(0.7deg); }
            50% { transform: translate(-0.8px, -1.2px) rotate(-0.5deg); }
            75% { transform: translate(-1.4px, 0.6px) rotate(0.6deg); }
        }
   
        .menu-item:hover .docs-img,
        .menu-item:hover .menu-img,
        .menu-item:hover .token-img {
            animation: none;
            transform: scale(1.08) translateX(-15px) translateY(-13px);
        }

        .roadmap-icon, .docs-icon, .token-icon {
            position: absolute; left: 100%; top: 100%; width: 32px; height: auto; opacity: 0; transition: all 0.35s ease; z-index: 10;
        }
        .roadmap-icon { transform: translateY(-50%) translateX(-80px); }
        .docs-icon { transform: translateY(-120%) translateX(-160px); }
        .token-icon { transform: translateY(-57px) translateX(-115px); }

        .menu-item:hover .roadmap-icon,
        .menu-item:hover .docs-icon,
        .menu-item:hover .token-icon { opacity: 1; }

        .big-cat {
            max-height: 82%;
            max-width: 82%;
            object-fit: contain;
            animation: catLick 4s infinite ease-in-out;
            transform-origin: bottom center;
        }

        @keyframes catLick {
            0%, 100% { transform: rotate(-3deg) translateY(0); }
            20% { transform: rotate(2deg) translateY(-8px); }
            45% { transform: rotate(-4deg) translateY(4px); }
            70% { transform: rotate(3deg) translateY(-6px); }
        }
    </style>
</head>
<body class="bg-white min-h-screen overflow-hidden">
    <!-- besc.png -->
    <div class="flex justify-center pt-8 pb-4">
        <img src="besc.png" alt="Brian’s Emotional Support Cat" style="max-width: 640px; height: auto;">
    </div>

    <!-- Адрес токена -->
    <div class="flex justify-center mb-6">
        <div class="bg-white border-4 border-black rounded-3xl px-8 py-4 shadow-xl flex items-center gap-4 text-xl font-bold">
            <span class="text-black">$BESC</span>
            <span class="font-mono text-lg tracking-wider text-zinc-700 select-all" id="token-address">
                0xb45362eeb2c2fc6b9e60e7833825d044e7cb4b07
            </span>
            <button onclick="copyAddress()" 
                    class="ml-2 text-2xl hover:scale-110 active:scale-95 transition">
                📋
            </button>
        </div>
    </div>

    <div class="flex h-screen">
        <!-- Левое меню -->
        <div class="w-96 bg-white flex flex-col p-8">
            <div class="mt-4 space-y-8">
                <a href="docs.html" class="menu-item">
                    <img src="docs.png" alt="Docs" class="docs-img">
                    <img src="doki.png" alt="Docs Icon" class="docs-icon">
                </a>
           
                <a href="roadmap.html" class="menu-item">
                    <img src="roadmap.png" alt="Roadmap" class="menu-img">
                    <img src="doroga.png" alt="Road" class="roadmap-icon">
                </a>
           
                <a href="#" class="menu-item">
                    <img src="nad.png" alt="Token" class="token-img">
                    <img src="token.png" alt="Token Icon" class="token-icon">
                </a>
            </div>
        </div>
   
        <!-- Кот по центру -->
        <div class="flex-1 flex items-center justify-center relative">
            <img src="cat.png" alt="Cat" class="big-cat">
        </div>
    </div>

    <script>
        function copyAddress() {
            const address = "0xb45362eeb2c2fc6b9e60e7833825d044e7cb4b07";
            navigator.clipboard.writeText(address).then(() => {
                const btn = event.currentTarget;
                const original = btn.innerHTML;
                btn.innerHTML = '✅';
                setTimeout(() => {
                    btn.innerHTML = original;
                }, 1800);
            });
        }
    </script>
</body>
</html>
