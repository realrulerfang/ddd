<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap');
        
        body { 
            font-family: 'Comic Neue', cursive;
            cursor: url('paw1.png') 16 16, auto; /* Курсор-лапка */
        }
        
        .menu-img {
            width: 110px;           /* Docs стала меньше */
            height: auto;
            image-rendering: crisp-edges;
        }
        
        .big-cat {
            max-height: 78%;
            max-width: 78%;
            object-fit: contain;
        }
    </style>
</head>
<body class="bg-white min-h-screen overflow-hidden">
    <div class="flex h-screen">
        
        <!-- Левая панель -->
        <div class="w-96 bg-white border-r-4 border-black flex flex-col p-8">
            <div class="mt-10">
                <h1 class="text-6xl font-bold">CAT</h1>
            </div>
            
            <div class="mt-20 space-y-12">
                <a href="#" class="flex items-center gap-6 group">
                    <img src="docs.png" alt="Docs" class="menu-img">
                </a>
                
                <a href="#" class="flex items-center gap-6 group">
                    <img src="roadmap.png" alt="Roadmap" class="menu-img">
                </a>
                
                <a href="#" class="flex items-center gap-6 group">
                    <img src="treasury.png" alt="Treasury" class="menu-img">
                </a>
            </div>
        </div>
        
        <!-- Правая часть с котом -->
        <div class="flex-1 flex items-end justify-center relative pb-12">
            <img src="cat.png" alt="Cat" class="big-cat">
        </div>
    </div>
</body>
</html>
