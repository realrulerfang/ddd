<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap');
        
        body {
            font-family: 'Comic Neue', cursive;
        }
        
        .hand-drawn {
            font-family: 'Comic Neue', cursive;
        }
        
        .menu-item {
            transition: all 0.3s ease;
        }
        
        .menu-item:hover {
            transform: translateX(20px);
        }
    </style>
</head>
<body class="bg-white min-h-screen overflow-hidden">
    <div class="flex h-screen">
        
        <!-- Левая панель -->
        <div class="w-96 bg-white border-r-4 border-black flex flex-col p-8">
            <div class="mt-10">
                <h1 onclick="window.location.reload()" 
                    class="text-6xl font-bold hand-drawn cursor-pointer hover:text-gray-600">
                    CAT
                </h1>
            </div>
            
            <div class="mt-20 space-y-14">
                <!-- Docs -->
                <a href="#" onclick="alert('Открываем Docs... 📖')" class="menu-item flex items-center gap-6 group">
                    <img src="docs.png" alt="Docs" class="w-36 h-auto transition-transform group-hover:scale-110">
                </a>
                
                <!-- Roadmap -->
                <a href="#" onclick="alert('Roadmap... 🗺️')" class="menu-item flex items-center gap-6 group">
                    <img src="roadmap.png" alt="Roadmap" class="w-36 h-auto transition-transform group-hover:scale-110">
                </a>
                
                <!-- Treasury -->
                <a href="#" onclick="alert('Treasury... 🪙')" class="menu-item flex items-center gap-6 group">
                    <img src="treasury.png" alt="Treasury" class="w-36 h-auto transition-transform group-hover:scale-110">
                </a>
            </div>
            
            <div class="mt-auto mb-6">
                <div class="border-4 border-black p-4 text-center text-xl font-bold hand-drawn">
                    v0.1
                </div>
            </div>
        </div>
        
        <!-- Правая часть с большим котом -->
        <div class="flex-1 flex items-center justify-center relative">
            <img src="cat.png" alt="Cat" 
                 class="max-h-[85%] max-w-[85%] object-contain drop-shadow-2xl">
            
            <!-- Надпись сверху -->
            <div class="absolute top-12 right-12 text-right">
                <h2 class="text-6xl font-bold hand-drawn leading-none">Hello, I'm</h2>
                <h2 class="text-6xl font-bold hand-drawn text-orange-500 leading-none">Cat!</h2>
            </div>
        </div>
    </div>
</body>
</html>
