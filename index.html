<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap');
        
        body { 
            font-family: 'Comic Neue', cursive;
            cursor: url('paw.png') 16 16, auto;
        }
        
        .menu-img {
            width: 210px;                    /* В 2 раза больше */
            height: auto;
            image-rendering: crisp-edges;
            animation: subtleShake 1.2s infinite ease-in-out;
        }
        
        @keyframes subtleShake {
            0%, 100% { transform: translate(0, 0) rotate(-1deg); }
            25%      { transform: translate(2px, 1px) rotate(1deg); }
            50%      { transform: translate(0, -2px) rotate(-0.8deg); }
            75%      { transform: translate(-2px, 1px) rotate(0.8deg); }
        }
        
        .menu-item:hover .menu-img {
            animation: none;
            transform: scale(1.08);
        }

        /* Анимация кота */
        .big-cat {
            max-height: 75%;
            max-width: 75%;
            object-fit: contain;
            animation: catLick 4s infinite ease-in-out;
            transform-origin: bottom center;
        }

        @keyframes catLick {
            0%, 100% { transform: rotate(-3deg) translateY(0); }
            20% { transform: rotate(2deg) translateY(-8px); }
            45% { transform: rotate(-4deg) translateY(4px); }
            70% { transform: rotate(3deg) translateY(-6px); }
        }
    </style>
</head>
<body class="bg-white min-h-screen overflow-hidden">
    <div class="flex h-screen">
        
        <!-- Левая панель -->
        <div class="w-96 bg-white flex flex-col p-8">
            <div class="mt-20 space-y-8">     <!-- Расстояние уменьшено в 2 раза -->
                <a href="#" class="menu-item">
                    <img src="docs.png" alt="Docs" class="menu-img">
                </a>
                
                <a href="#" class="menu-item">
                    <img src="roadmap.png" alt="Roadmap" class="menu-img">
                </a>
                
                <a href="#" class="menu-item">
                    <img src="treasury.png" alt="Treasury" class="menu-img">
                </a>
            </div>
        </div>
        
        <!-- Анимированный кот -->
        <div class="flex-1 flex items-end justify-center relative pb-12 pl-8">
            <img src="cat.png" alt="Cat" class="big-cat">
        </div>
    </div>
</body>
</html>
