<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap');
     
        body {
            font-family: 'Comic Neue', cursive;
            cursor: url('paw.png') 16 16, auto;
        }
     
        .menu-item {
            display: flex;
            align-items: center;
            gap: 24px;
            position: relative;
        }
        /* Docs — меньше */
        .docs-img {
            width: 135px;
            height: auto;
            image-rendering: crisp-edges;
            animation: subtleShake 0.8s infinite ease-in-out;
        }
        /* Roadmap — большой */
        .menu-img {
            width: 210px;
            height: auto;
            image-rendering: crisp-edges;
            animation: subtleShake 0.8s infinite ease-in-out;
        }
        /* Token — чуть меньше + сдвиг */
        .token-img {
            width: 175px;
            height: auto;
            image-rendering: crisp-edges;
            animation: subtleShake 0.8s infinite ease-in-out;
            transform: translateX(-15px) translateY(-13px);
        }
     
        @keyframes subtleShake {
            0%, 100% { transform: translate(0, 0) rotate(-0.6deg); }
            25% { transform: translate(1.5px, 0.8px) rotate(0.7deg); }
            50% { transform: translate(-0.8px, -1.2px) rotate(-0.5deg); }
            75% { transform: translate(-1.4px, 0.6px) rotate(0.6deg); }
        }
     
        .menu-item:hover .docs-img,
        .menu-item:hover .menu-img,
        .menu-item:hover .token-img {
            animation: none;
            transform: scale(1.08) translateX(-15px) translateY(-13px);
        }
